name: nutritrack
description: "NutriTrack - Aplikasi Pelacak Nutrisi dan Kalori Harian"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # UI
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  flutter_vision: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/nutritrack.tflite
    - assets/labels.txt
